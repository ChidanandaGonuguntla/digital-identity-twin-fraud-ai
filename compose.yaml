services:
  postgres:
    image: postgres:16-alpine
    container_name: digital-twin-postgres
    environment:
      POSTGRES_DB: digital_twin
      POSTGRES_USER: twin_admin
      POSTGRES_PASSWORD: twin_admin_password
    ports:
      - "5432:5432"
    volumes:
      - digital_twin_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U twin_admin -d digital_twin"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ./backend
    container_name: digital-twin-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/digital_twin
      SPRING_DATASOURCE_USERNAME: twin_admin
      SPRING_DATASOURCE_PASSWORD: twin_admin_password
      APP_CORS_ALLOWED_ORIGINS: http://localhost:3000,http://localhost:5173,http://localhost:5174
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    container_name: digital-twin-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  digital_twin_pgdata:
