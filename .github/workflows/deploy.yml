name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: staging
        type: choice
        options:
          - staging
          - production
      image_tag:
        description: Image tag to deploy
        required: true
        default: 0.1.0

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/${{ github.repository_owner }}/digital-twin-fraud-backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/digital-twin-fraud-frontend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Build backend jar
        run: cd backend && mvn -B -DskipTests package

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:${{ inputs.image_tag }}
            ${{ env.BACKEND_IMAGE }}:latest

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          build-args: |
            VITE_API_BASE_URL=/api/v1
            VITE_WS_URL=/ws/decisions
            VITE_SECURITY_ENABLED=true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:${{ inputs.image_tag }}
            ${{ env.FRONTEND_IMAGE }}:latest

  helm-lint:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
        with:
          version: v3.16.2
      - name: Lint chart
        run: |
          helm lint deploy/helm/digital-twin-fraud
          helm template digital-twin-fraud deploy/helm/digital-twin-fraud \
            --set backend.image.tag=${{ inputs.image_tag }} \
            --set frontend.image.tag=${{ inputs.image_tag }} \
            > /tmp/rendered.yaml

  deploy:
    runs-on: ubuntu-latest
    needs: helm-lint
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
        with:
          version: v3.16.2
      - name: Configure kubeconfig
        run: echo "${{ secrets.KUBE_CONFIG }}" > $HOME/.kube/config
      - name: Deploy with Helm
        run: |
          VALUES_FILE=deploy/helm/digital-twin-fraud/values.yaml
          if [ "${{ inputs.environment }}" = "production" ]; then
            VALUES_FILE=deploy/helm/digital-twin-fraud/values-prod.yaml
          fi
          helm upgrade --install digital-twin-fraud deploy/helm/digital-twin-fraud \
            --namespace fraud-platform \
            --create-namespace \
            --set backend.image.tag=${{ inputs.image_tag }} \
            --set frontend.image.tag=${{ inputs.image_tag }} \
            -f "$VALUES_FILE"
      - name: Verify rollout
        run: |
          kubectl rollout status deployment/digital-twin-fraud-backend -n fraud-platform --timeout=300s
          kubectl rollout status deployment/digital-twin-fraud-frontend -n fraud-platform --timeout=300s
