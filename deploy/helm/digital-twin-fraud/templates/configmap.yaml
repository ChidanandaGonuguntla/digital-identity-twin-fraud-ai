apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "digital-twin-fraud.fullname" . }}-config
  labels:
    {{- include "digital-twin-fraud.labels" . | nindent 4 }}
data:
  SERVER_PORT: {{ .Values.backend.env.serverPort | quote }}
  SPRING_DATASOURCE_URL: {{ include "digital-twin-fraud.datasourceUrl" . | quote }}
  SPRING_DATASOURCE_USERNAME: {{ .Values.postgresql.username | quote }}
  SPRING_KAFKA_BOOTSTRAP_SERVERS: {{ .Values.kafka.bootstrapServers | quote }}
  SPRING_KAFKA_PROPERTIES_SECURITY_PROTOCOL: {{ .Values.kafka.securityProtocol | quote }}
  SPRING_KAFKA_PROPERTIES_SASL_MECHANISM: {{ .Values.kafka.saslMechanism | quote }}
  APP_CORS_ALLOWED_ORIGINS: {{ .Values.backend.env.corsAllowedOrigins | quote }}
  APP_SECURITY_ENABLED: {{ .Values.backend.env.securityEnabled | quote }}
  APP_REDIS_ENABLED: {{ .Values.redis.enabled | quote }}
  APP_REDIS_HOST: {{ .Values.redis.host | quote }}
  APP_REDIS_PORT: {{ .Values.redis.port | quote }}
  FRAUD_KAFKA_ENABLED: {{ .Values.backend.env.fraudKafkaEnabled | quote }}
  DTI_ML_PROVIDER: {{ .Values.backend.env.mlProvider | quote }}
  OTEL_EXPORTER_OTLP_ENDPOINT: {{ .Values.monitoring.otel.tracesEndpoint | quote }}
  OTEL_EXPORTER_OTLP_METRICS_ENDPOINT: {{ .Values.monitoring.otel.metricsEndpoint | quote }}
  OTEL_METRICS_EXPORT_ENABLED: {{ .Values.monitoring.otel.metricsExportEnabled | quote }}
  OTEL_TRACES_SAMPLER_PROBABILITY: {{ .Values.monitoring.otel.tracesSampleProbability | quote }}
  IDENTITY_PROVIDER: {{ .Values.identity.provider | quote }}
  IDENTITY_ISSUER_URI: {{ .Values.identity.issuerUri | quote }}
  IDENTITY_AUDIENCE: {{ .Values.identity.audience | quote }}
  IDENTITY_JWKS_URI: {{ .Values.identity.jwksUri | quote }}
  nginx.conf: |
    server {
        listen 80;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;
        gzip on;
        gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
        location /api/ {
            proxy_pass http://{{ include "digital-twin-fraud.backend.fullname" . }}:{{ .Values.backend.service.port }}/api/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        location /ws/ {
            proxy_pass http://{{ include "digital-twin-fraud.backend.fullname" . }}:{{ .Values.backend.service.port }}/ws/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_read_timeout 3600s;
        }
        location / {
            try_files $uri $uri/ /index.html;
        }
        location = /healthz {
            access_log off;
            return 200 'ok';
            add_header Content-Type text/plain;
        }
    }
