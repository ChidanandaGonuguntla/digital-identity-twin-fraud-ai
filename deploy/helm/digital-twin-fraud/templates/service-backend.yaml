{{- if .Values.backend.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "digital-twin-fraud.backend.fullname" . }}
  labels:
    {{- include "digital-twin-fraud.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
  {{- if .Values.monitoring.prometheus.scrape }}
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/path: {{ .Values.monitoring.prometheus.path | quote }}
    prometheus.io/port: {{ .Values.backend.service.port | quote }}
  {{- end }}
spec:
  type: {{ .Values.backend.service.type }}
  selector:
    {{- include "digital-twin-fraud.backend.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.backend.service.port }}
      targetPort: http
      protocol: TCP
{{- end }}
