receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  memory_limiter:
    check_interval: 1s
    limit_mib: 1024
  batch:
    timeout: 10s
    send_batch_size: 1024
  resource:
    attributes:
      - key: deployment.environment
        value: production
        action: upsert

exporters:
  otlphttp/azuremonitor:
    endpoint: https://your-region.monitor.azure.com
    headers:
      Authorization: Bearer ${AZURE_MONITOR_TOKEN}
  otlp/datadog:
    endpoint: https://api.datadoghq.com:4317
    headers:
      DD-API-KEY: ${DATADOG_API_KEY}
  otlp/tempo:
    endpoint: tempo.observability.svc:4317
    tls:
      insecure: true

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, batch, resource]
      exporters: [otlp/tempo, otlphttp/azuremonitor, otlp/datadog]
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, batch, resource]
      exporters: [otlphttp/azuremonitor, otlp/datadog]
