global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules/slo-recording.yml
  - /etc/prometheus/rules/slo-alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

scrape_configs:
  - job_name: digital-twin-fraud-backend
    metrics_path: /actuator/prometheus
    scrape_interval: 15s
    static_configs:
      - targets: ['backend:8080']
        labels:
          service: fraud-backend
          environment: local

  - job_name: otel-collector
    scrape_interval: 15s
    static_configs:
      - targets: ['otel-collector:8889']
        labels:
          service: otel-collector
          environment: local
