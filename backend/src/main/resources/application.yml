server:
  port: 9997
  shutdown: graceful
spring:
  lifecycle:
    timeout-per-shutdown-phase: 30s
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: digital-twin-fraud-service
      auto-offset-reset: earliest
      max-poll-records: 50
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.citizens.digital.twin.*
        spring.json.value.default.type: com.citizens.digital.twin.api.dto.FraudDecisionRequest
        spring.json.use.type.headers: false
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
      properties:
        enable.idempotence: true
  application:
    name: digital-twin-identity-poc
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/digital_twin_db?currentSchema=identity_twin}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:admin}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: DigitalTwinHikariPool
      maximum-pool-size: ${DB_POOL_MAX_SIZE:20}
      minimum-idle: ${DB_POOL_MIN_IDLE:5}
      idle-timeout: 30000
      max-lifetime: 1800000
      connection-timeout: 30000
      validation-timeout: 5000
      leak-detection-threshold: 60000
      auto-commit: false
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: identity_twin
        format_sql: false
  flyway:
    enabled: true
    schemas: identity_twin
    default-schema: identity_twin
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 1
dti:
  scoring:
    min-history: 3
    amount-weight: 45
    geo-velocity-weight: 35
    new-device-weight: 20
    new-country-weight: 15
    unusual-hour-weight: 10
    new-category-weight: 10
    category-velocity-weight: 15
    high-risk-category-weight: 15
    impossible-speed-kmh: 900
    challenge-threshold: 40
    block-threshold: 70
    drift-threshold: 50
    challenge-expiration-hours: 24
  ml:
    provider: ${DTI_ML_PROVIDER:onnx}
    models-directory: classpath:models
    active-version: fraud-risk-v1.0.0
    rollback-version: fraud-risk-v0.9.0
    champion-version: ${DTI_ML_CHAMPION_VERSION:fraud-risk-v1.0.0}
    challenger-version: ${DTI_ML_CHALLENGER_VERSION:fraud-risk-v0.9.0}
    challenger-enabled: ${DTI_ML_CHALLENGER_ENABLED:true}
    drift-baseline-score: 0.15
    drift-alert-threshold: 0.35
app:
  flyway:
    repair-on-startup: ${APP_FLYWAY_REPAIR:false}
  identity:
    provider: ${IDENTITY_PROVIDER:local}
    issuer-uri: ${IDENTITY_ISSUER_URI:}
    audience: ${IDENTITY_AUDIENCE:}
    jwks-uri: ${IDENTITY_JWKS_URI:}
    roles-claim: ${IDENTITY_ROLES_CLAIM:roles}
    groups-claim: ${IDENTITY_GROUPS_CLAIM:groups}
  redis:
    enabled: ${APP_REDIS_ENABLED:false}
    host: ${APP_REDIS_HOST:localhost}
    port: ${APP_REDIS_PORT:6379}
    password: ${APP_REDIS_PASSWORD:}
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173,http://localhost:5174}
  security:
    enabled: ${APP_SECURITY_ENABLED:false}
    jwt-secret: ${APP_JWT_SECRET:local-dev-secret-change-in-production-min-32-chars}
    jwt-expiration-minutes: ${APP_JWT_EXPIRATION_MINUTES:480}
    users:
      - email: analyst@citizens.com
        password: password
        role: FRAUD_ANALYST
      - email: manager@citizens.com
        password: password
        role: FRAUD_MANAGER
      - email: auditor@citizens.com
        password: password
        role: AUDITOR
      - email: modeladmin@citizens.com
        password: password
        role: MODEL_RISK_ADMIN
      - email: admin@citizens.com
        password: admin
        role: ADMIN
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: when_authorized
      probes:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        fraud_decision_latency_ms: true
  tracing:
    sampling:
      probability: ${OTEL_TRACES_SAMPLER_PROBABILITY:1.0}
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318/v1/traces}
    metrics:
      export:
        enabled: ${OTEL_METRICS_EXPORT_ENABLED:false}
        url: ${OTEL_EXPORTER_OTLP_METRICS_ENDPOINT:http://localhost:4318/v1/metrics}
        step: 30s
logging:
  level:
    root: INFO
    com.citizens.digital.twin: INFO
resilience4j:
  circuitbreaker:
    instances:
      onnxMl:
        sliding-window-size: 20
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
  ratelimiter:
    instances:
      fraudDecisions:
        limit-for-period: 200
        limit-refresh-period: 1s
        timeout-duration: 0
fraud:
  observability:
    model-drift-interval-ms: 30000
  kafka:
    enabled: ${FRAUD_KAFKA_ENABLED:true}
    lag-monitor-interval-ms: 30000
    transaction-topic: dti.transaction-events
    decision-topic: dti.fraud-decisions
    audit-topic: dti.fraud-audit-events
    step-up-topic: dti.step-up-challenges
    twin-drift-topic: dti.twin-drift-events
    transaction-dlt-topic: dti.transaction-events.dlt
    decision-dlt-topic: dti.fraud-decisions.dlt
    consumer-retry-attempts: 3
    consumer-retry-interval-ms: 1000